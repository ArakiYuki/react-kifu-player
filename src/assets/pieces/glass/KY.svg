<svg width="100" height="110" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
    <!-- ドロップシャドウ -->
    <filter id="glassShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <polygon 
    points="18,30 50,5 82,30 93,105 7,105" 
    fill="url(#glassGrad)" 
    stroke="rgba(255, 255, 255, 0.6)" 
    stroke-width="1.5"
    filter="url(#glassShadow)"
  />
  
  <!-- ガラスのハイライト（左上） -->
  <polygon 
    points="18,37 48,10 50,10 20,38" 
    fill="rgba(255, 255, 255, 0.5)" 
  />
  
  <text 
    x="50" y="62" 
    font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif" font-size="52" font-weight="900" 
    fill="#ffffff" text-anchor="middle" dominant-baseline="central"
    filter="url(#blur)" opacity="0.4"
  >香</text>
  
  <text 
    x="50" y="62" 
    font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif" font-size="52" font-weight="900" 
    fill="#ffffff" text-anchor="middle" dominant-baseline="central"
  >香</text>
</svg>