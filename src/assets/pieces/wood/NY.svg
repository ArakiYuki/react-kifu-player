<svg width="100" height="110" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 木目風の縦グラデーション -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf4e3" />
      <stop offset="50%" stop-color="#eecda3" />
      <stop offset="100%" stop-color="#d4aa70" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <polygon 
    points="18,30 50,5 82,30 93,105 7,105" 
    fill="url(#woodGrad)" 
    stroke="#8b7340" 
    stroke-width="1.5"
    filter="url(#shadow)"
  />
  
  <text 
    x="50" y="62" 
    font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif" font-size="52" font-weight="900" 
    fill="#d32f2f" text-anchor="middle" dominant-baseline="central"
  >杏</text>
</svg>